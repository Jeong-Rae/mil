<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7136부대 위치 정보 관리 시스템</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="scanner-page">
  <main class="page scanner-shell">
    <header class="topbar">
      <div>
        <h1>7136부대 위치 정보 관리 시스템</h1>
      </div>
      <a class="link-button" href="/board.html">현황판 보기</a>
    </header>

    <section class="panel">
      <section id="location-select-panel" class="location-select-panel">
        <p>스캐너에 들어가기 전에 위치를 선택해 주세요.</p>
        <button id="choose-location-button" class="primary-button" type="button">위치 선택</button>
      </section>

      <dialog id="location-dialog" class="location-dialog">
        <form id="location-dialog-form" class="location-dialog-form" method="dialog">
          <h2>스캐너 위치 선택</h2>
          <label class="field" for="location-select">
            <span>위치</span>
            <select id="location-select">
              <option value="">위치를 선택해 주세요</option>
            </select>
          </label>
          <div class="location-dialog-actions">
            <button id="cancel-location-button" class="link-button" type="button">취소</button>
            <button id="select-location-button" class="primary-button" type="submit">선택 완료</button>
          </div>
        </form>
      </dialog>

      <section id="scanner-panel" hidden>
        <div class="selected-location">
          <span class="selected-location-label">선택 위치</span>
          <strong id="selected-location-text">-</strong>
        </div>

        <form id="scan-form" class="scan-form">
          <label class="field">
            <span>바코드</span>
            <input id="barcode-input" type="text" autocomplete="off" placeholder="ENa25-76046946">
          </label>
        </form>
      </section>

      <section class="message-panel" aria-live="polite">
        <div class="message-label">처리 결과</div>
        <div id="message-text" class="message-text">위치를 선택해 주세요.</div>
      </section>
    </section>
  </main>
  <script src="/script.js"></script>
</body>
</html>
