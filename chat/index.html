<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple LAN Chat</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <section class="panel" id="connectPanel">
      <div class="sectionHeader">
        <h2>Connect</h2>
        <span id="connectionStatus" class="status-badge offline">Disconnected</span>
      </div>
      <p id="statusText">서버에 연결되지 않았습니다.</p>

      <form id="connectForm">
        <label class="field">
          <span>Name</span>
          <input id="nameInput" name="name" type="text" placeholder="alice" autocomplete="off" />
        </label>

        <button id="connectButton" type="submit">Connect</button>
      </form>
    </section>

    <section class="panel" id="messagesPanel">
      <div class="sectionHeader">
        <h2>Messages</h2>
        <p id="chatMeta">메시지 없음</p>
      </div>

      <ul id="messageList" aria-live="polite"></ul>

      <form id="messageForm">
        <input
          id="messageInput"
          name="message"
          type="text"
          placeholder="메시지를 입력하세요"
          autocomplete="off"
          disabled
        />
        <button id="sendButton" type="submit" disabled>Send</button>
      </form>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
